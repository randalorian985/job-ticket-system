services:
  api-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/src:delegated
      - api_nuget_cache:/root/.nuget/packages
      - api_obj:/src/src/Api/obj
      - api_bin:/src/src/Api/bin
    working_dir: /src/src/Api
    command: dotnet watch run --urls http://+:80
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=JobTicketDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - FileStorage__RootPath=/src/src/Api/storage
      - TestBootstrap__Enabled=true
      - TestBootstrap__MigrateDatabase=true
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app:delegated
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "3000:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:5000
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  api_nuget_cache:
  api_obj:
  api_bin:
  frontend_node_modules:
